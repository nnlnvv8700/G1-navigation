# Sensor mounting offsets (used for TF transforms)
sensorMountingOffsets:
  ros__parameters:
    sensorOffsetX: 0.3
    sensorOffsetY: 0.0
    sensorOffsetZ: 0.15

# SLAM sensor configuration
feature_extraction_node:
  ros__parameters:
    lidar_flip: false
    blindFront: 0.2  # Larger front blind zone due to sensor offset
    blindBack: -0.6
    blindLeft: 0.3
    blindRight: -0.3
    blindDiskLow: -0.8
    blindDiskHigh: 0.8
    blindDiskRadius: 0.3  # Larger radius for bigger robot

imu_preintegration_node:
  ros__parameters:
    lidar_flip: false

localPlanner:
  ros__parameters:
    # Vehicle dimensions
    vehicleLength: 1.2
    vehicleWidth: 0.5

    # Speed limits
    maxSpeed: 0.5
    autonomySpeed: 0.875

    # Goal tolerances
    goalClearRange: 0.6
    goalBehindRange: 0.8
    goalReachedThreshold: 0.5
    goalYawThreshold: 0.15

pathFollower:
  ros__parameters:
    # Control parameters
    lookAheadDis: 0.5
    maxAccel: 2.0
    goalYawGain: 2.0

    # Slow down threshold
    slowDwnDisThre: 0.875
    omniDirDiffThre: 1.5