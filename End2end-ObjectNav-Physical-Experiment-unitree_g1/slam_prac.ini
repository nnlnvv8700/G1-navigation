### 0.2 启动仿真环境

#### 🚀 方法 1：一键启动（推荐）

```bash
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
./system_simulation.sh
```

**启动过程说明**：
```
1. Unity 3D 环境启动（会弹出窗口）
   ↓ 等待 3 秒
2. ROS 2 系统启动（终端输出日志）
   ↓ 等待 1 秒
3. RVIZ 可视化启动（会弹出窗口）
```

**如果一切正常**，你会看到：
- ✅ Unity 窗口：3D 室内环境（可以用鼠标拖动视角）
- ✅ RVIZ 窗口：机器人、点云、地图等
- ✅ 终端：各种 `[INFO]` 日志输出

#### 🔧 方法 2：分步启动（调试用）

如果一键脚本失败，可以手动逐步启动：

**终端 1 - Unity 环境**：
```bash
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
./src/base_autonomy/vehicle_simulator/mesh/unity/environment/Model.x86_64

# 应该弹出 Unity 窗口，显示 3D 环境
```

**终端 2 - ROS 系统**（等待 Unity 完全启动后）：
```bash
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
source install/setup.bash
ros2 launch vehicle_simulator system_simulation.launch

# 等待看到 "[INFO] ... localPlanner ..." 日志
```

**终端 3 - RVIZ**（等待系统启动后）：
```bash
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
source install/setup.bash
ros2 run rviz2 rviz2 -d src/base_autonomy/vehicle_simulator/rviz/vehicle_simulator.rviz
```

