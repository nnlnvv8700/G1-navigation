### 0.5 仿真练习总结

**完成仿真练习后，你应该掌握**：

- ✅ **RVIZ 界面**：各个显示项的含义（点云、地图、路径）
- ✅ **机器人控制**：使用控制面板设置速度和方向
- ✅ **SLAM 原理**：地图如何从点云数据构建
- ✅ **Waypoint 导航**：设置目标点，观察自主导航
- ✅ **地图质量判断**：什么是好的地图，什么是差的地图
- ✅ **故障排查**：遇到问题知道如何调试

**仿真 vs 真机的区别**：

| 方面 | 仿真环境 | 真机（G1） |
|------|----------|------------|
| 数据 | 虚拟 LiDAR，无噪声 | 真实 LiDAR，有噪声 |
| 环境 | 固定，可重复 | 动态，不可预测 |
| 风险 | 零风险 | 需要小心操作 |
| 调试 | 快速迭代 | 耗时较长 |
| 盲区 | 无需配置 | **必须配置**（关键！） |
| 控制 | RVIZ/键盘 | WebRTC 手柄 |

**现在你可以自信地部署到真机了！** 🎉

> **💡 重要提示**：
> - 真机部署时，**盲区参数配置**是必须的（仿真不需要）
> - 真机的 SLAM 定位可能不如仿真稳定，需要耐心调试
> - 建议先在**空旷区域**测试，熟练后再去复杂环境
