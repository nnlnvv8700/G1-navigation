## 🎮 仿真环境练习（可选，强烈推荐新手）

**在真机上部署前，强烈建议先在仿真环境中练习 SLAM 和导航操作！**

### 为什么要用仿真？

- ✅ **零风险**：不用担心撞坏昂贵的 G1 机器人
- ✅ **快速迭代**：可以反复试验，失败了立即重来
- ✅ **熟悉界面**：提前了解 RVIZ 和系统操作
- ✅ **理解 SLAM**：直观观察地图构建过程
- ✅ **省时间**：比真机调试快得多

---

### 0.1 仿真环境安装

#### 步骤 1：安装依赖

**在你的 PC 上执行**（不是 G1，是你自己的电脑）：

```bash
# 确保 ROS 2 Jazzy 已安装
# 如果还没安装，参考 "第一步：系统安装" 章节

# 安装仿真所需的额外依赖
sudo apt update
sudo apt install ros-jazzy-desktop-full ros-jazzy-pcl-ros libpcl-dev git

# 验证安装
ros2 --version
# 应该显示：ros2 cli version: jazzy
```

#### 步骤 2：编译仿真版本

```bash
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1

# 编译（跳过 SLAM 和 LiDAR 驱动，仿真不需要真实硬件驱动）
colcon build --symlink-install \
  --cmake-args -DCMAKE_BUILD_TYPE=Release \
  --packages-skip arise_slam_mid360 arise_slam_mid360_msgs livox_ros_driver2

# 编译时间：约 5-10 分钟
```

#### 步骤 3：下载 Unity 环境模型

**这是关键步骤**！仿真需要 3D 环境模型。

**方法 1：Google Drive 下载（推荐）**

1. 访问下载链接：
   - 🔗 [Unity Environment Model (Google Drive)](https://drive.google.com/drive/folders/1G1JYkccvoSlxyySuTlPfvmrWoJUO8oSs?usp=sharing)

2. 选择版本：
   - **without_360_camera.zip** ← 推荐（性能好，适合普通电脑）
   - with_360_camera.zip （需要强大的 GPU）

3. 下载到本地（约 200-500 MB）

**方法 2：解压并放置文件**

```bash
# 进入目标目录
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1/src/base_autonomy/vehicle_simulator/mesh/unity

# 假设你下载的文件在 ~/Downloads/
# 解压（根据实际文件名调整）
unzip ~/Downloads/without_360_camera.zip -d ./

# 解压后应该有这样的结构：
# environment/
#   ├── Model_Data/          (文件夹)
#   ├── Model.x86_64         (可执行文件)
#   ├── UnityPlayer.so       (库文件)
#   ├── AssetList.csv
#   ├── Dimensions.csv
#   └── Categories.csv
```

**方法 3：验证文件**

```bash
# 检查文件是否存在
ls -lh environment/

# 应该看到：
# -rwxr-xr-x  Model.x86_64        (约 20-30 MB)
# -rw-r--r--  UnityPlayer.so      (约 50-80 MB)
# drwxr-xr-x  Model_Data/         (文件夹)
```

**方法 4：添加执行权限**

```bash
# 确保可执行
chmod +x environment/Model.x86_64

# 再次确认权限
ls -l environment/Model.x86_64
# 应该显示：-rwxr-xr-x （注意开头的 x）
```

