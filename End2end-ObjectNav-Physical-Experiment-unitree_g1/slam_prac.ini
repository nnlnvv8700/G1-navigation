#### 🎮 步骤 2：学习控制方法

仿真环境支持**两种控制方式**：

##### **方式 A：RVIZ 控制面板（最简单）**

在 RVIZ 左侧找到 **Control Panel**：

```
┌─────────────────────┐
│   Control Panel     │
├─────────────────────┤
│ Speed:   [====    ] │ ← 拖动滑块：前进/后退速度（0-1 m/s）
│ Yaw Rate: [  ====  ]│ ← 拖动滑块：转向速度（-1 到 1 rad/s）
│ [  黑色点击区域  ]  │ ← 点击重置为 0
└─────────────────────┘
```

**练习操作**：

```bash
# 1. 前进 2 米
在 RVIZ 中：
- 拖动 Speed 滑块到 0.5 （中间偏右）
- 观察机器人前进（Unity 窗口和 RVIZ 同步）
- 数 4 秒
- 点击黑色区域，机器人停止

# 2. 右转 90 度
- 拖动 Yaw Rate 滑块到 0.5 （右边）
- 观察机器人原地右转
- 旋转约 90 度后，点击黑色区域停止

# 3. 左平移（如果支持）
- 拖动对应滑块测试
```

##### **方式 B：键盘控制（需要额外终端）**

```bash
# 新开终端
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
source install/setup.bash

# 方法 1：使用 teleop_twist_keyboard
sudo apt install ros-jazzy-teleop-twist-keyboard
ros2 run teleop_twist_keyboard teleop_twist_keyboard

# 按键说明：
# i: 前进
# , : 后退
# j: 左转
# l: 右转
# k: 停止
# q/z: 增加/减少速度
```

---

#### 🗺️ 步骤 3：手动建图（仿真版）

**目标**：让机器人走遍虚拟环境，构建完整地图。

##### **3.1 开始探索**

使用 RVIZ 控制面板慢慢移动：

```bash
# 建议路线（假设从房间中央开始）：

# 阶段 1：探索第一个房间
1. Speed = 0.4，前进到墙边（停在距离墙 1 米）
2. Yaw Rate = 0.3，右转 90 度
3. Speed = 0.4，沿着墙走
4. 重复步骤 2-3，走完房间一圈

# 阶段 2：进入其他房间
5. 找到门口，慢慢通过（Speed = 0.3）
6. 重复阶段 1 的操作
7. 探索所有房间和走廊

# ⏱️ 预计时间：3-5 分钟
```

##### **3.2 观察地图构建过程**

**在 RVIZ 中实时观察**：

```
✅ /terrain_map 话题（地形地图层）：
   - 显示机器人周围的局部地形
   - 彩色编码：绿色=可通行，红色=障碍物
   - 实时更新

✅ /overall_map 话题（全局地图层）：
   - 黑色区域：障碍物（墙壁、家具）
   - 白色区域：可通行区域（地面）
   - 灰色区域：未探索区域
   - 🎯 目标：灰色区域越来越少

✅ /registered_scan 话题（点云层）：
   - 白色/彩色点：实时 LiDAR 扫描
   - 点的形状反映环境结构
   - 墙壁应该是一条清晰的线

✅ /explored_areas 话题（已探索区域）：
   - 显示已经探索过的区域范围
```

**好的地图特征**：

```
✅ 墙壁：
   - 边缘清晰锐利
   - 直线墙壁是直的（不是波浪形）
   - 厚度均匀（1-2 个栅格）

✅ 房间：
   - 形状完整，能辨认
   - 门口清晰可见
   - 家具轮廓清楚

✅ 连通性：
   - 所有房间都连在一起
   - 没有"孤岛"或断裂
```

##### **3.3 完整建图步骤**

**实战操作（从头到尾）**：

```bash
# 第一步：原地观察（30 秒）
Yaw Rate = 0.5，旋转 360 度（两圈）
目的：让系统初始化，建立初始地图

# 第二步：沿墙探索（2 分钟）
Speed = 0.4，沿着第一面墙前进
到达拐角：Yaw Rate = 0.3，转 90 度
继续：Speed = 0.4，沿着下一面墙
重复：走完房间一圈

# 第三步：进入其他房间（2 分钟）
找到门口：Speed = 0.3，缓慢通过
进入新房间：重复第二步操作
探索所有连通区域

# 第四步：填补空白（1 分钟）
在 RVIZ 地图中找到灰色（未探索）区域
控制机器人走到那些区域
直到地图基本完整

# ✅ 完成标志：
# - 所有房间都显示在地图上
# - 没有大片灰色未探索区域
# - 墙壁和障碍物清晰可见
```

---

#### 📍 步骤 4：Waypoint 导航练习

地图建完后，练习自主导航功能。

##### **4.1 设置第一个 Waypoint**

```bash
# 在 RVIZ 中：
1. 点击顶部工具栏的 "Waypoint" 按钮
   （图标可能是一个旗子或靶子）

2. 在地图上点击一个目标位置：
   - ✅ 选择白色区域（已知可通行）
   - ✅ 距离当前位置 2-5 米
   - ❌ 不要选择黑色（障碍物）
   - ❌ 不要选择灰色（未知区域）
   - ❌ 不要选择太远（> 10 米）

3. 观察机器人：
   - 应该自动开始移动
   - 黄色路径显示规划的路线
   - 会自动绕开障碍物

4. 等待到达：
   - 机器人到达目标点后会停下
   - 可以设置下一个 waypoint
```

##### **4.2 连续导航练习**

```bash
# 设置一系列 waypoint，测试系统能力：

# 任务 1：房间内导航
Waypoint A → 房间左上角
Waypoint B → 房间右上角
Waypoint C → 房间右下角
Waypoint D → 回到起点
观察：机器人是否走最优路径？

# 任务 2：跨房间导航
Waypoint A → 当前房间中心
Waypoint B → 门口
Waypoint C → 隔壁房间中心
观察：是否正确通过门口？

# 任务 3：避障测试
在 Unity 窗口中（如果支持）移动虚拟障碍物
或：设置一个 waypoint，然后在路径上放置障碍
观察：机器人是否能重新规划路径？
```

##### **4.3 常见问题**

**Q：设置 waypoint 后机器人不动？**
```bash
# 解决方法：
# 1. 确保点击了 "Resume Navigation to Goal" 按钮
# 2. 检查 waypoint 是否在可通行区域（白色）
# 3. 查看终端是否有错误信息
```

**Q：机器人卡在原地转圈？**
```bash
# 原因：waypoint 设置在障碍物后面（死路）
# 解决方法：
# 1. 点击 RVIZ 的黑色区域，停止当前任务
# 2. 重新设置一个更近、更容易到达的 waypoint
```

**Q：机器人路径很奇怪，绕了大圈？**
```bash
# 原因：局部最优解
# 解决方法：
# 1. 这是正常的（规划器的特性）
# 2. 可以设置中间 waypoint 引导路径
# 3. 或者使用更高级的全局规划器（FAR Planner）
```

