#### 问题 4：性能问题（卡顿、帧率低）

**症状**：Unity 窗口或 RVIZ 很卡，更新很慢。

**解决方法**：

```bash
# 方法 1：降低 Unity 画质
# 在 Unity 窗口中：
# - 按 ESC 键打开菜单
# - 找到 "Graphics" 或 "Quality"
# - 选择 "Low" 或 "Fastest"

# 方法 2：使用轻量版环境模型
# 下载 "without_360_camera" 版本（如果还没有）
# 解压替换当前的 environment 文件夹

# 方法 3：关闭其他占用 GPU 的程序
# 浏览器、视频播放器等

# 方法 4：降低 RVIZ 点云密度
# 在 RVIZ 中：
# - 找到 PointCloud2 显示项
# - 展开 "PointCloud2" 设置
# - 调整 "Size (m)" 或 "Decay Time"

# 方法 5：减少显示项
# 在 RVIZ 左侧面板：
# - 取消勾选不需要的显示项（例如 Camera）
# - 只保留 Map, PointCloud2, Path
```

---

#### 问题 5：编译失败

**症状**：运行 `colcon build` 时出错。

**常见错误及解决方法**：

```bash
# 错误 1：找不到 PCL 库
CMake Error: Could not find PCL...
# 解决：
sudo apt install ros-jazzy-pcl-ros libpcl-dev

# 错误 2：Python 模块缺失
ModuleNotFoundError: No module named 'XXX'
# 解决：
pip3 install XXX

# 错误 3：权限问题
Permission denied...
# 解决：
# 不要使用 sudo colcon build
# 确保项目文件夹权限正确：
sudo chown -R $USER:$USER ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1

# 错误 4：磁盘空间不足
No space left on device
# 解决：
# 清理 build 文件夹：
rm -rf build install log
# 再重新编译

# 如果都不行，完全重新编译：
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
rm -rf build install log
colcon build --symlink-install \
  --cmake-args -DCMAKE_BUILD_TYPE=Release \
  --packages-skip arise_slam_mid360 arise_slam_mid360_msgs livox_ros_driver2
```

