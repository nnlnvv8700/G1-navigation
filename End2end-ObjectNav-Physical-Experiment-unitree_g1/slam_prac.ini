### 0.4 仿真环境故障排查

#### 问题 1：Unity 窗口无法启动

**症状**：双击或运行脚本后，Unity 窗口没出现。

**排查步骤**：

```bash
# 1. 检查文件是否存在
ls -l src/base_autonomy/vehicle_simulator/mesh/unity/environment/Model.x86_64

# 如果显示 "No such file or directory"：
# → 说明没有正确下载/解压 Unity 模型
# → 回到步骤 0.1 重新下载

# 2. 检查执行权限
ls -l src/base_autonomy/vehicle_simulator/mesh/unity/environment/Model.x86_64
# 应该看到：-rwxr-xr-x

# 如果没有 x 权限：
chmod +x src/base_autonomy/vehicle_simulator/mesh/unity/environment/Model.x86_64

# 3. 检查缺失的库
ldd src/base_autonomy/vehicle_simulator/mesh/unity/environment/Model.x86_64 | grep "not found"

# 如果有输出（例如 libXXX.so => not found）：
sudo apt install <对应的包>

# 常见缺失库：
sudo apt install libgl1 libxcursor1 libxinerama1 libxrandr2

# 4. 手动启动测试
cd src/base_autonomy/vehicle_simulator/mesh/unity/environment
./Model.x86_64
# 查看终端输出的错误信息
```

---

#### 问题 2：RVIZ 中看不到点云/地图

**症状**：RVIZ 打开了，但是没有点云或地图数据。

**排查步骤**：

```bash
# 1. 检查话题是否发布
ros2 topic list | grep -E "(scan|map)"
terrain_map
# /overall_map

# 如果没有，检查 ROS 系统是否启动：
ros2 node list
# 应该看到：localPlanner, terrainAnalysis, vehicleSimulator 等节点

# 2. 检查话题频率
ros2 topic hz /registered_scan
# 初始可能显示 "does not appear to be published yet"
# 等待 3-5 秒后应该有输出：average rate: 6-10 Hz

ros2 topic hz /terrain_map
# 应该有输出：average rate: 1-2 Hz

# 如果一直没有输出：
# → Unity 和 ROS 没有连接
# → 检查 /default_server_endpoint 节点是否运行

# 3. 检查 RVIZ 显示配置
# 在 RVIZ 左侧面板中：
# - 找到 "PointCloud2" 显示项
# - 确保 "Topic" 设置为 /registered_scan
# - 检查 "Status" 是否显示 OK
# - 找到 "Map" 显示项
# - 确保 "Topic" 设置为 /terrain_map 或 /overall_map

# 4. 手动订阅测试
ros2 topic echo /registered_scan --no-arr
# 应该看到不断输出的点云数据
# 如果有输出，说明数据正常，是 RVIZ 配置问题

# 5. 检查 Unity-ROS 桥接
ros2 node list | grep endpoint
# 应该看到：/default_server_endpoint
ros2 to所有话题（控制相关话题可能不会主动发布）
ros2 topic list
# 主要检查基础话题是否存在

# 2. 检查 joy 话题（手柄控制）
ros2 topic hz /joy
# 如果连接了手柄，应该有输出

# 3. 检查 waypoint 话题
ros2 topic echo /way_point
# 当你在 RVIZ 中点击 Waypoint 按钮时，这里会有输出

# 4. 手动测试：发送状态命令
# 检查 Unity 是否响应 ROS 命令
ros2 topic pub /unity_sim/set_model_state geometry_msgs/msg/PoseStamped \
  "header: {frame_id: 'map'}
   pose: {position: {x: 0.0, y: 0.0, z: 0.0}, orientation: {w: 1.0}}" --once

# 观察 Unity 窗口中机器人是否移动/重置位置

# 5. 检查 Unity-ROS 桥接节点
ros2 node list | grep endpoint
# 应该看到：/default_server_endpoint

# 查看节点详细信息
ros2 node info /default_server_
# 3. 手动发送速度命令测试
ros2 topic pub /cmd_vel geometry_msgs/msg/Twist \
  "linear: {x: 0.5, y: 0.0, z: 0.0}
   angular: {x: 0.0, y: 0.0, z: 0.0}" --once

# 观察机器人是否移动
# 如果移动了，说明系统正常，是 RVIZ 控制面板问题

# 4. 检查 Unity 和 ROS 连接
ros2 node list | grep endpoint
# 应该看到：/endpoint

# 查看 endpoint 日志
ros2 node info /endpoint
```

