### 0.3 仿真中的 SLAM 建图练习

#### 🎯 目标

在虚拟环境中熟悉：
- ✅ RVIZ 界面操作
- ✅ 机器人控制方法
- ✅ 地图构建过程
- ✅ Waypoint 导航流程

---

#### ✅ 步骤 1：检查系统状态

**在 RVIZ 窗口中应该看到**：

```
✅ 3D 环境（Unity 窗口）：
   - 一个虚拟室内场景
   - 有墙壁、门、家具等

✅ 机器人模型（RVIZ 中心）：
   - 一个轮式平台（模拟移动底盘）
   - 红绿蓝坐标轴（表示方向）

✅ 点云数据（白色/彩色点）：
   - 模拟 LiDAR 扫描的环境点
   - 实时更新

✅ 局部地图（栅格）：
   - 黑色 = 障碍物
   - 白色 = 可通行区域
   - 灰色 = 未知区域
```

**在终端检查话题**：

```bash
# 新开一个终端
cd ~/g1/End2end-ObjectNav-Physical-Experiment-unitree_g1
source install/setup.bash

# 查看所有话题
ros2 topic list

# 应该看到关键话题：
# /registered_scan    - 点云数据（LiDAR 扫描）
# /terrain_map        - 局部地形地图
# /overall_map        - 全局地图
# /state_estimation   - 状态估计（机器人位置和姿态）
# /way_point          - 目标航点
# /joy                - 手柄输入
# /camera/image       - 相机图像
# /tf                 - 坐标变换

# 检查点云数据频率
ros2 topic hz /registered_scan
# 应该输出：average rate: 6-10 Hz（初始会显示未发布，等几秒）

# 检查地形地图
ros2 topic hz /terrain_map
# 应该输出：average rate: 1-2 Hz

# 检查状态估计
ros2 topic hz /state_estimation
# 应该输出：average rate: 50-100 Hz
```

